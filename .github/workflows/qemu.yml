name: QEMU Compile

on:
  # Allow to trigger action manually
  workflow_dispatch:

jobs:
  build_qemu:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 1

    - name: Install dependencies
      run: apt-get update && apt-get -y install git make pkg-config libdevmapper-dev libseccomp-dev libbtrfs-dev jq python3-venv libglib2.0-dev libspice-protocol-dev libspice-server-dev libpixman-1-dev libvirglrenderer-dev libusbredirparser-dev flex bison meson ninja-build pkg-config libcap-dev libseccomp-dev libselinux1-dev gnutls-dev libparted-dev libxml2-dev libpciaccess-dev libjson-c-dev gettext docutils-common python3-docutils iasl nasm python3-distutils dh-autoreconf autogen libcrypto++-dev libssl-dev libjson-glib-dev gnutls-bin expect gawk socat libusb-1.0-0-dev libxml2-utils bzip2 xsltproc patch g++

    - name: Compile QEMU
      run: |
        # Get QEMU version and create necessary directories
        QEMU_V=$(wget -qO- https://gitlab.com/api/v4/projects/11167699/repository/tags | jq -r '[.[] | select(.name | test("-(rc|beta|alpha)"; "i") | not)] | .[].name' | sort -V | tail -1)
        BUILDDIR=${{ github.workspace }}/$QEMU_V
        PACKAGEDIR=$BUILDDIR/qemu_package
        mkdir -p $PACKAGEDIR/etc/libvirt.mos/qemu/swtpm-localca/tpm-states mkdir -p $PACKAGEDIR/etc/init.d $PACKAGEDIR/DEBIAN

        # QEMU
        cd $BUILDDIR
        git clone --branch $QEMU_V --single-branch --depth 1 https://gitlab.com/qemu-project/qemu.git
        cd $BUILDDIR/qemu
        ./configure --enable-kvm --enable-spice --enable-usb-redir --enable-virglrenderer --prefix=/usr --enable-vnc --enable-libusb \
              --target-list="x86_64-softmmu,i386-softmmu"
        make -j20
        DESTDIR=$PACKAGEDIR make install -j20

        # libvirt
        LIBVIRT_V=$(wget -qO- https://gitlab.com/api/v4/projects/192693/repository/tags | jq -r '[.[] | select(.name | test("-(rc|beta|alpha)"; "i") | not)] | .[0].name')
        cd $BUILDDIR
        git clone --branch $LIBVIRT_V --single-branch --depth 1 https://gitlab.com/libvirt/libvirt
        cd $BUILDDIR/libvirt

        meson setup build \
            --prefix=/usr \
            --libdir=lib/x86_64-linux-gnu \
            -Ddriver_qemu=enabled \
            -Ddriver_network=enabled \
            -Dstorage_dir=enabled \
            -Dstorage_disk=enabled \
            -Dstorage_fs=enabled \
            -Dstorage_lvm=enabled \
            -Dstorage_iscsi=enabled \
            -Dstorage_scsi=enabled \
            -Dstorage_mpath=enabled \
            -Dstorage_rbd=disabled \
            -Dstorage_gluster=disabled \
            -Dstorage_zfs=disabled \
            -Dinit_script=none \
            -Dsasl=disabled \
            -Dpolkit=disabled \
            -Dapparmor=disabled \
            -Dselinux=disabled \
            -Dfirewalld=disabled \
            -Dwireshark_dissector=disabled \
            -Dhost_validate=enabled \
            -Dtests=disabled \
            -Dexpensive_tests=disabled

        meson compile -C build
        DESTDIR=$PACKAGEDIR meson install -C build
        cp -R $PACKAGEDIR/etc/libvirt/* $PACKAGEDIR/etc/libvirt.mos/
        rm -rf $PACKAGEDIR/etc/libvirt

        # Seabios
        SEABIOS_V=$(curl -u ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} https://api.github.com/repos/coreboot/seabios/tags | jq -r '.[0].name')
        cd $BUILDDIR
        git clone --branch $SEABIOS_V --single-branch --depth 1 https://git.seabios.org/seabios.git
        cd $BUILDDIR/seabios
        ln -s /usr/bin/python3 /usr/bin/python
        make -j20
        cp $BUILDDIR/seabios/out/bios.bin $PACKAGEDIR/usr/share/qemu/bios.bin

        # OVMF
        OVMF_V=$(curl -u ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} https://api.github.com/repos/tianocore/edk2/releases/latest | jq -r '.tag_name')
        cd $BUILDDIR
        git clone --branch $OVMF_V --single-branch --depth 1 https://github.com/tianocore/edk2.git
        cd $BUILDDIR/edk2

        git submodule update --init
        cp ${{ github.workspace }}/edk2_files/logo.bmp $BUILDDIR/edk2/MdeModulePkg/Logo/Logo.bmp
        patch $BUILDDIR/edk2/OvmfPkg/Library/PlatformBmPrintScLib/StatusCodeHandler.c < ${{ github.workspace }}/edk2_files/hidemessage.patch
        git apply ${{ github.workspace }}/edk2_files/disable_efi_mem_attr_proto.patch
        make -C BaseTools -j20

        OvmfPkg/build.sh -b RELEASE -a X64 -t GCC5 -n 20 -D TPM1_ENABLE -D TPM2_ENABLE -D TPM_CONFIG_ENABLE -D SECURE_BOOT_ENABLE -D NETWORK_TLS_ENABLE
        mv Build/OvmfX64 Build/OvmfX64_TPM
        OvmfPkg/build.sh -b RELEASE -a X64 -t GCC5 -n 20 -D FD_SIZE_2MB

        cp Build/OvmfX64_TPM/RELEASE_GCC5/FV/OVMF_CODE.fd $PACKAGEDIR/usr/share/qemu/OVMF/OVMF_CODE-TPM.fd
        cp Build/OvmfX64_TPM/RELEASE_GCC5/FV/OVMF_VARS.fd $PACKAGEDIR/usr/share/qemu/OVMF/OVMF_VARS-TPM.fd
        cp Build/OvmfX64/RELEASE_GCC5/FV/OVMF_CODE.fd $PACKAGEDIR/usr/share/qemu/OVMF/OVMF_CODE.fd
        cp Build/OvmfX64/RELEASE_GCC5/FV/OVMF_VARS.fd $PACKAGEDIR/usr/share/qemu/OVMF/OVMF_VARS.fd

        # libtpms
        LIBTPMS_V=$(curl -u ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} https://api.github.com/repos/stefanberger/libtpms/releases/latest | jq -r '.tag_name')
        cd $BUILDDIR
        git clone --branch $LIBTPMS_V --single-branch --depth 1 https://github.com/stefanberger/libtpms.git
        cd $BUILDDIR/libtpms

        ./autogen.sh --prefix=/usr --libdir=/usr/lib/x86_64-linux-gnu
        make -j20
        make install -j20
        DESTDIR=$PACKAGEDIR make install -j20

        # swtpm
        SWTPM_V=$(curl -u ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} https://api.github.com/repos/stefanberger/swtpm/releases/latest | jq -r '.tag_name')
        cd $BUILDDIR
        git clone --branch $SWTPM_V --single-branch --depth 1 https://github.com/stefanberger/swtpm.git
        cd $BUILDDIR/swtpm

        ./autogen.sh --with-openssl --with-gnutls --prefix=/usr --libdir=/usr/lib/x86_64-linux-gnu
        make -j20

        DESTDIR=$PACKAGEDIR make install -j20

        rm -rf $PACKAGEDIR/var/lib/swtpm-localca $PACKAGEDIR/var/lib/libvirt/swtpm

        echo 'statedir = /etc/libvirt/qemu/swtpm-localca
        signingkey = /etc/libvirt/qemu/swtpm-localca/signkey.pem
        issuercert = /etc/libvirt/qemu/swtpm-localca/issuercert.pem
        certserial = /etc/libvirt/qemu/swtpm-localca/certserial' > $PACKAGEDIR/etc/swtpm-localca.conf

        cd $PACKAGEDIR/var/lib/libvirt
        ln -s /etc/libvirt/qemu/swtpm-localca/tpm-states swtpm

        cp ${{ github.workspace }}/etc/init.d/libvirtd $PACKAGEDIR/etc/init.d/libvirtd
        cp ${{ github.workspace }}/etc/init.d/virtlogd $PACKAGEDIR/etc/init.d/virtlogd
        rm -rf $PACKAGEDIR/usr/share/qemu/edk2*

        cat > $PACKAGEDIR/DEBIAN/control << EOF
        Package: QEMU
        Version: ${QEMU_V#v}
        Architecture: amd64
        Maintainer: admin@minenet.at
        Description: Custom QEMU build for MOS
        EOF

        cd $BUILDDIR
        chmod -R 755 $PACKAGEDIR
        dpkg-deb --build qemu_package mos-qemu_${QEMU_V#v}_amd64.deb
        md5sum $BUILDDIR/mos-qemu_${QEMU_V#v}_amd64.deb | awk '{print $2}' > $BUILDDIR/mos-qemu_${QEMU_V#v}_amd64.deb.md5

        echo "QEMU_V=${QEMU_V#v}
        LIBVIRT_V=${LIBVIRT_V#v}
        SEABIOS_V=${SEABIOS_V#v}
        OVMF_V=${OVMF_V#v}
        LIBTPMS_V=${LIBTPMS_V#v}
        SWTPM_V=${SWTPM_V#v}
        BUILDDIR=$BUILDDIR" >> $GITHUB_ENV

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ env.QEMU_V }}
        release_name: "QEMU ${{ env.QEMU_V }}"
        body: |
          This is the custom Debian package from QEMU for MOS

          ### Package contents:
          - [qemu](https://gitlab.com/qemu-project/qemu) v${{ env.QEMU_V }}
          - [libvirt](https://gitlab.com/libvirt/libvirt) v${{ env.LIBVIRT_V }}
          - [seabios](https://github.com/coreboot/seabios) v${{ env.LIBVIRT_V }}
          - [edk2](https://github.com/tianocore/edk2) v${{ env.OVMF_V }}
          - [libtpms](https://github.com/stefanberger/libtpms) v${{ env.LIBTPMS_V }}
          - [swtpm](https://github.com/stefanberger/swtpm) v${{ env.SWTPM_V }}
        draft: false
        prerelease: false

    - name: Upload deb to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ env.BUILDDIR }}/mos-qemu_${{ env.QEMU_V }}_amd64.deb
        asset_name: mos-qemu_${{ env.QEMU_V }}_amd64.deb
        asset_content_type: application/vnd.debian.binary-package

    - name: Upload md5 to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ env.BUILDDIR }}/mos-qemu_${{ env.QEMU_V }}_amd64.deb.md5
        asset_name: mos-qemu_${{ env.QEMU_V }}_amd64.deb.md5
        asset_content_type: text/plain

    - name: Cleanup
      if: always()
      run: rm -rf ${{ github.workspace }}/* ${{ github.workspace }}/.*
